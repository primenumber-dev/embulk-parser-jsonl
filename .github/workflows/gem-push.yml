name: Ruby Gem

on:
  workflow_dispatch:
  push:
    branches:
      - "master"
    tags:
      - "*"

jobs:
  build:
    name: Build + Publish
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java8
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "8"
      - name: push gem
        uses: trocco-io/push-gem-to-gpr-action@v2
        with:
          language: java
          gem-path: "./build/gems/*.gem"
          github-token: "${{ secrets.GITHUB_TOKEN }}"
